name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check numpy pytest

      - name: Compile Python sources
        run: |
          python -m compileall -q service frontend benchmarks tests
          python -m py_compile integrations/ollama/ollama-voice

      - name: Run regression and documentation tests
        run: python -m pytest -q

      - name: Check shell syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
          done < <(git ls-files -z -- '*.sh')
